<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RyOS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#ffffff;
    color:#111111;
}

.container{
    max-width:720px;
    margin:auto;
    padding:40px 24px;
}

#home-screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

h1{
    font-size:4rem;
    font-weight:700;
    margin-bottom:24px;
    color:#111;
}

.subtitle{
    font-size:1.3rem;
    line-height:1.7;
    color:#555;
    max-width:600px;
    margin-bottom:40px;
}

button{
    background:#111;
    color:white;
    border:none;
    border-radius:12px;
    padding:16px 28px;
    font-size:16px;
    cursor:pointer;
    width:fit-content;
}

button:hover{
    opacity:.92;
}

.hidden{
    display:none;
}

#question-screen{
    padding-top:80px;
}

#progress{
    color:#888;
    margin-bottom:16px;
}

#question{
    font-size:2rem;
    line-height:1.3;
    margin-bottom:24px;
}

textarea{
    width:100%;
    min-height:140px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:16px;
    font-size:16px;
    margin-bottom:24px;
    resize:vertical;
}

#loading-screen,
#success-screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

#loading-screen h2,
#success-screen h2{
    font-size:2rem;
    margin-bottom:20px;
}

.secondary{
    margin-top:12px;
    background:#f5f5f5;
    color:#111;
}

</style>
</head>

<body>

<div class="container">

    <div id="home-screen">

        <h1>RyOS</h1>

        <p class="subtitle">
            Generate a personalized AI configuration.<br><br>
            Built around how you think, work, communicate,
            and make decisions.<br><br>
            The process takes less than 5 minutes.
        </p>

        <button onclick="startQuestionnaire()">
            Generate My Config
        </button>

    </div>

    <div id="question-screen" class="hidden">

        <div id="progress"></div>

        <h2 id="question"></h2>

        <textarea id="answer"></textarea>

        <button onclick="nextQuestion()">
            Continue
        </button>

    </div>

    <div id="loading-screen" class="hidden">

        <h2>Generating your configuration...</h2>

        <p>Please wait.</p>

    </div>

    <div id="success-screen" class="hidden">

        <h2>Your configuration is ready.</h2>

        <button onclick="downloadConfig()">
            Download Config
        </button>

        <button class="secondary" onclick="location.reload()">
            Generate Another
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
