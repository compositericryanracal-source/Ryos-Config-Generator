<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RyOS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#fff;
    color:#111;
}

.hidden{
    display:none !important;
}

.container{
    max-width:700px;
    margin:auto;
    padding:0 32px;
}

#home-screen,
#loading-screen,
#success-screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#question-screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

h1{
    font-size:5rem;
    letter-spacing:-3px;
    margin-bottom:16px;
}

.subtitle{
    font-size:1.15rem;
    color:#666;
    line-height:1.7;
    margin-bottom:36px;
}

#progress{
    color:#888;
    margin-bottom:18px;
}

#question{
    font-size:2rem;
    line-height:1.4;
    margin-bottom:24px;
}

textarea{
    width:100%;
    min-height:180px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:18px;
    font-size:16px;
    margin-bottom:24px;
}

.button-group,
.question-actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:12px;
    background:#111;
    color:white;
    padding:16px 28px;
    cursor:pointer;
    font-size:16px;
}

.secondary{
    background:#f3f3f3;
    color:#111;
}

.explore-link{
    margin-top:18px;
    text-decoration:none;
    color:#666;
}

.explore-link:hover{
    color:#111;
}

#loading-message{
    color:#666;
    margin-top:12px;
}
</style>
</head>
<body>

<div class="container">

<div id="home-screen">
    <h1>RyOS</h1>

    <p class="subtitle">
        Generate a personalized AI configuration.
        <br><br>
        The process takes less than five minutes.
    </p>

    <div class="button-group">
        <button onclick="startQuestionnaire()">
            Generate My Config
        </button>
    </div>

    <a class="explore-link" href="ryos.html">
        Explore RyOS
    </a>
</div>

<div id="question-screen" class="hidden">

    <div id="progress"></div>

    <h2 id="question"></h2>

    <textarea id="answer"></textarea>

    <div class="question-actions">
        <button class="secondary" onclick="previousQuestion()">Back</button>
        <button onclick="nextQuestion()">Next</button>
        <button class="secondary" onclick="restartQuestionnaire()">Restart</button>
    </div>

</div>

<div id="loading-screen" class="hidden">
    <h2>Generating your configuration...</h2>
    <p id="loading-message">Analyzing operating patterns</p>
</div>

<div id="success-screen" class="hidden">
    <h2>Your configuration is ready.</h2>

    <div class="button-group">
        <button onclick="downloadConfig()">Download Config</button>
        <button class="secondary" onclick="location.reload()">Generate Another</button>
    </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
