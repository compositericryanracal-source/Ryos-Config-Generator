<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RyOS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="home-screen">

        <h1>RyOS</h1>

        <p class="subtitle">
            Generate a personalized AI configuration.
        </p>

        <p class="description">
            Built around how you think, work, communicate, and make decisions.
        </p>

        <button onclick="startQuestionnaire()">
            Generate My Config
        </button>

    </div>

    <div id="question-screen" class="hidden">

        <div id="progress"></div>

        <h2 id="question"></h2>

        <textarea id="answer" rows="5"></textarea>

        <button onclick="nextQuestion()">
            Continue
        </button>

    </div>

    <div id="loading-screen" class="hidden">

        <h2>Generating your configuration...</h2>

    </div>

    <div id="success-screen" class="hidden">

        <h2>Your configuration is ready.</h2>

        <button onclick="downloadConfig()">
            Download Config
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
