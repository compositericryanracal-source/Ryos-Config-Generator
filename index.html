<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RyOS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#fff;
    color:#111;
}

.container{
    max-width:700px;
    margin:auto;
    padding:80px 24px;
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

h1{
    font-size:4rem;
    font-weight:700;
    margin-bottom:16px;
}

.subtitle{
    font-size:1.25rem;
    color:#666;
    line-height:1.6;
    margin-bottom:40px;
}

button{
    background:#111;
    color:white;
    border:none;
    border-radius:12px;
    padding:16px 28px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.hidden{
    display:none;
}

.question-card{
    margin-top:80px;
}

.progress{
    color:#888;
    margin-bottom:20px;
}

.question{
    font-size:2rem;
    margin-bottom:30px;
    line-height:1.3;
}

input, textarea, select{
    width:100%;
    padding:16px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
    margin-bottom:20px;
}

.loading{
    text-align:center;
    padding:100px 0;
}

.loading h2{
    margin-bottom:20px;
}

.success{
    text-align:center;
    padding:100px 0;
}

.success h2{
    margin-bottom:20px;
}

.secondary{
    background:#f5f5f5;
    color:#111;
    margin-top:12px;
}
</style>
</head>

<body>

<div class="container">

<div id="home" class="hero">
    <h1>RyOS</h1>

    <p class="subtitle">
        Generate a personalized AI configuration.<br><br>
        Built around how you think, work, communicate,
        and make decisions.<br><br>
        The process takes less than 5 minutes.
    </p>

    <button onclick="startQuestions()">
        Generate My Config
    </button>
</div>

<div id="questions" class="hidden">
    <div class="question-card">

        <div class="progress" id="progress"></div>

        <div class="question" id="questionText"></div>

        <input id="answerInput">

        <button onclick="nextQuestion()">
            Continue
        </button>

    </div>
</div>

<div id="loading" class="hidden loading">
    <h2>Generating your configuration...</h2>
    <p>Please wait.</p>
</div>

<div id="success" class="hidden success">
    <h2>Your configuration is ready.</h2>

    <button onclick="downloadConfig()">
        Download Config
    </button>

    <br>

    <button class="secondary" onclick="location.reload()">
        Generate Another
    </button>
</div>

</div>

<script>

const questions = [

"What best describes your work?",

"When solving problems, what do you naturally do first?",

"How do you prefer receiving information?",

"What causes the most friction in your work?",

"What puts you into flow?",

"What drains your energy fastest?",

"How do you make important decisions?",

"What are you currently optimizing for?",

"What environment helps you perform best?",

"What kind of life are you trying to build?",

"What do people rely on you for?",

"What is your biggest recurring challenge?",

"What do you learn faster than most people?",

"What type of work feels meaningful to you?",

"If you could remove one recurring problem from your life, what would it be?"

];

let currentQuestion = 0;
let answers = [];
let generatedConfig = "";

function startQuestions(){

    document.getElementById("home").classList.add("hidden");
    document.getElementById("questions").classList.remove("hidden");

    renderQuestion();
}

function renderQuestion(){

    document.getElementById("progress").innerText =
        `Question ${currentQuestion+1} of ${questions.length}`;

    document.getElementById("questionText").innerText =
        questions[currentQuestion];

    document.getElementById("answerInput").value = "";
}

function nextQuestion(){

    const answer =
        document.getElementById("answerInput").value.trim();

    if(!answer) return;

    answers.push(answer);

    currentQuestion++;

    if(currentQuestion >= questions.length){

        generate();

    }else{

        renderQuestion();

    }
}

function generate(){

    document.getElementById("questions")
        .classList.add("hidden");

    document.getElementById("loading")
        .classList.remove("hidden");

    setTimeout(()=>{

        generatedConfig = createConfig();

        document.getElementById("loading")
            .classList.add("hidden");

        document.getElementById("success")
            .classList.remove("hidden");

    },3000);
}

function createConfig(){

return `system: ryos generated

identity

work:
${answers[0]}

cognition

problem solving:
${answers[1]}

information preference:
${answers[2]}

workflow

friction:
${answers[3]}

flow conditions:
${answers[4]}

energy drains:
${answers[5]}

decision style:
${answers[6]}

optimization target:
${answers[7]}

environment:
${answers[8]}

goals

target life:
${answers[9]}

strengths

people rely on:
${answers[10]}

recurring challenge:
${answers[11]}

learning advantage:
${answers[12]}

meaningful work:
${answers[13]}

primary obstacle:
${answers[14]}

anchor

generated by RyOS V0
`;
}

function downloadConfig(){

    const blob =
        new Blob([generatedConfig], {type:'text/plain'});

    const link =
        document.createElement('a');

    link.href =
        URL.createObjectURL(blob);

    link.download =
        'ryos-config.txt';

    link.click();
}

</script>

</body>
</html>
